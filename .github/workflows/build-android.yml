name: Build Android APK

on:
  push:
    branches: [ android, main, master ]
  pull_request:
    branches: [ android ]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Fix Android namespace issues
        run: node scripts/fix-android-namespaces.js

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle', 'android/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.1.8937393"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Inject auto-increment version from CI run number ──
      - name: Set version from CI run number
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${VERSION_CODE}"
          echo "Version: ${VERSION_NAME} (code: ${VERSION_CODE})"
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          echo "=== Updated build.gradle ==="
          grep -E "versionCode|versionName" android/app/build.gradle

      # ── Generate JS bundle for Release (Metro bundler) ──
      - name: Clean assets & create directories
        run: |
          rm -rf android/app/src/main/res/drawable-*
          rm -rf android/app/src/main/res/raw
          mkdir -p android/app/src/main/assets

      - name: Bundle JS for Release
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PalmAI-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Output APK info
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK" ]; then
            ls -lh "$APK"
            echo "✅ Release APK 构建成功！"
          fi

  # ── Deploy CloudBase Function ──
  deploy-cloud:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.TCB_SECRET_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy analyzePalm function
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          echo "🚀 正在部署云函数 analyzePalm..."
          
          # 安装云函数依赖
          cd cloudfunctions/analyzePalm
          npm install
          cd ../..
          
          # 登录 CloudBase
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          
          # 部署云函数
          tcb fn deploy analyzePalm \
            --envId cloud1-d4gtuqrxoa3005eeb \
            --dir cloudfunctions/analyzePalm \
            --force
          
          echo "✅ 云函数部署完成！"
