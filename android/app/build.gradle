apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

react {
    // Hermes JS engine (default: true for RN 0.73)
    hermesEnabled = true
}

android {
    namespace "com.palmai.app"
    compileSdk rootProject.ext.compileSdkVersion

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "com.palmai.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "false"
        buildConfigField "boolean", "IS_HERMES_ENABLED", "true"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // The com.facebook.react plugin adds react-android and hermes-android automatically
    // via includeBuild, so we don't need to specify them manually
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
