apply plugin: "com.android.application"

/**
 * React Native: manual dependency approach (no com.facebook.react plugin)
 * The plugin via includeBuild is unreliable on CI runners.
 * Dependencies are added manually below.
 */
project.ext.react = [
    enableHermes: true,
    root: "../../"
]

android {
    namespace "com.palmai.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.palmai.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // React Native core
    implementation "com.facebook.react:react-android"
    implementation "com.facebook.react:hermes-android"
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
