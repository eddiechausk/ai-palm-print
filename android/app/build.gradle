apply plugin: "com.android.application"

/**
 * React Native: manual dependency approach
 * react-android:0.73.6 exists on Maven Central with variant-aware GMM
 */
project.ext.react = [
    enableHermes: true,
    root: "../../"
]

android {
    namespace "com.palmai.app"
    compileSdk rootProject.ext.compileSdkVersion

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "com.palmai.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "false"
        buildConfigField "boolean", "IS_HERMES_ENABLED", "true"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.facebook.react:react-android:${rootProject.ext.reactNativeVersion}"
    implementation "com.facebook.react:hermes-android:${rootProject.ext.reactNativeVersion}"
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
