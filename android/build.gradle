buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
        reactNativeVersion = "0.73.6"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.0")
    }
}

allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        mavenCentral {
            content {
                excludeGroup "com.facebook.react"
            }
        }
        google()
        maven { url 'https://jitpack.io' }
    }
}

subprojects { subproject ->
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            android {
                buildToolsVersion rootProject.ext.buildToolsVersion
                compileSdk rootProject.ext.compileSdkVersion
            }
        }
    }

    configurations.all {
        resolutionStrategy {
            force "com.facebook.react:react-android:${rootProject.ext.reactNativeVersion}"
            force "com.facebook.react:hermes-android:${rootProject.ext.reactNativeVersion}"
        }
        resolutionStrategy.eachDependency { DependencyResolveDetails details ->
            if (details.requested.group == 'com.facebook.react' && details.requested.name == 'react-native') {
                details.useTarget group: 'com.facebook.react', name: 'react-android', version: rootProject.ext.reactNativeVersion
            }
        }
    }
}
